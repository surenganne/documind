name: documind

networks:
  documind:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  nginx:
    image: nginx:alpine
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - documind
    env_file: ../.env

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8010 --workers 4
    depends_on:
      - postgres
      - redis
    networks:
      - documind
    env_file: ../.env

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers worker -Q default --concurrency=2 --loglevel=info
    depends_on:
      - postgres
      - redis
    networks:
      - documind
    env_file: ../.env

  eval_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers worker -Q eval_queue --concurrency=2 --loglevel=info
    depends_on:
      - postgres
      - redis
    networks:
      - documind
    env_file: ../.env

  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers beat --loglevel=info
    depends_on:
      - redis
    networks:
      - documind
    env_file: ../.env

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - documind
    env_file: ../.env

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - documind
    env_file: ../.env

  frontend:
    image: nginx:alpine
    depends_on:
      - backend
    networks:
      - documind
    env_file: ../.env
